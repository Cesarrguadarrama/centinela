spring:
  application:
    name: centinela-backend

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:centinela}
    username: ${POSTGRES_USER:centinela}
    password: ${POSTGRES_PASSWORD:centinela_dev_password}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:centinela-detection}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: mx.centinela.bootstrap.infrastructure.kafka.TransactionEventPayload
        spring.json.use.type.headers: false
        spring.json.trusted.packages: mx.centinela.bootstrap.infrastructure.kafka

centinela:
  kafka:
    topics:
      transactions: ${KAFKA_TOPIC_TRANSACTIONS:spei.transactions}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
