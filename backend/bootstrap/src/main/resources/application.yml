spring:
  application:
    name: centinela-backend

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:centinela}
    username: ${POSTGRES_USER:centinela}
    password: ${POSTGRES_PASSWORD:centinela_dev_password}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:centinela-detection}

centinela:
  kafka:
    topics:
      transactions: ${KAFKA_TOPIC_TRANSACTIONS:spei.transactions}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
