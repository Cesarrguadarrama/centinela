name: centinela

services:
  # ----------------------------------------------------------
  # Infrastructure
  # ----------------------------------------------------------
  kafka:
    image: apache/kafka:3.9.0
    container_name: centinela-kafka
    ports:
      - "29092:29092" # host access for local development
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: centinela-postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-centinela}
      POSTGRES_USER: ${POSTGRES_USER:-centinela}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-centinela_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-centinela} -d ${POSTGRES_DB:-centinela}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: centinela-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------
  # Applications
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: bootstrap/Dockerfile
    container_name: centinela-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-centinela}
      POSTGRES_USER: ${POSTGRES_USER:-centinela}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-centinela_dev_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_TRANSACTIONS: ${KAFKA_TOPIC_TRANSACTIONS:-spei.transactions}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-centinela-detection}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  generator:
    build:
      context: ./backend
      dockerfile: generator/Dockerfile
    container_name: centinela-generator
    ports:
      - "${GENERATOR_PORT:-8081}:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_TRANSACTIONS: ${KAFKA_TOPIC_TRANSACTIONS:-spei.transactions}
      GENERATOR_MODE: ${GENERATOR_MODE:-idle}
      GENERATOR_TPS: ${GENERATOR_TPS:-10}
      GENERATOR_ACCOUNTS: ${GENERATOR_ACCOUNTS:-2000}
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    container_name: centinela-frontend
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      - backend

volumes:
  postgres-data:
