server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API + SSE stream (phase 4+)
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        # SSE: disable buffering so events flush immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_read_timeout 1h;
    }

    # Demo control: dashboard buttons trigger generator attack scenarios
    location /generator/ {
        proxy_pass http://generator:8081/;
        proxy_http_version 1.1;
    }
}
